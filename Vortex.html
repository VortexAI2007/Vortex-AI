<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vortex AI</title>

<style>
body{
font-family:Arial;
margin:0;
background:#0f0f0f;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

header{
padding:15px;
background:#1a1a1a;
text-align:center;
font-size:22px;
font-weight:bold;
}

#chat{
flex:1;
overflow:auto;
padding:20px;
}

.msg{
margin:10px 0;
}

.user{color:#00ffc3;}
.ai{color:white;}

footer{
display:flex;
padding:10px;
background:#1a1a1a;
gap:10px;
}

input{
flex:1;
padding:10px;
border-radius:8px;
border:none;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
background:#333;
color:white;
cursor:pointer;
}
</style>

</head>

<body>

<header>Vortex AI</header>

<div id="chat"></div>

<footer>
<input id="input" placeholder="Ask Vortex...">
<button onclick="send()">Send</button>
<button onclick="voice()">🎤</button>
</footer>

<script>

const chat=document.getElementById("chat")
const input=document.getElementById("input")

function add(text,cls){
const d=document.createElement("div")
d.className="msg "+cls
d.textContent=text
chat.appendChild(d)
chat.scrollTop=chat.scrollHeight
}

async function send(){

const text=input.value.trim()
if(!text)return

add("You: "+text,"user")
input.value=""

add("Vortex: thinking...","ai")

const response=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer YOUR_API_KEY"
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{role:"system",content:"You are Vortex AI assistant. Answer shortly and clearly."},
{role:"user",content:text}
]
})
})

const data=await response.json()

document.querySelectorAll(".ai").forEach(e=>{
if(e.textContent.includes("thinking")){
e.textContent="Vortex: "+data.choices[0].message.content
}
})

}

function voice(){

const rec=new(window.SpeechRecognition||window.webkitSpeechRecognition)()

rec.lang="auto"

rec.onresult=function(e){

const text=e.results[0][0].transcript

input.value=text

send()

}

rec.start()

}

</script>

</body>
</html>
